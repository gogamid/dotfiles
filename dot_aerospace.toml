start-at-login = true

after-startup-command = [
  'exec-and-forget borders active_color=0xff869a6e inactive_color=0xff494d64 width=5.0',
]

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 10

default-root-container-layout = 'tiles'

default-root-container-orientation = 'auto'

key-mapping.preset = 'qwerty'

on-focus-changed = ['move-mouse window-lazy-center']
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[exec]
inherit-env-vars = true

[exec.env-vars]
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

[workspace-to-monitor-force-assignment]
10 = ['secondary']

[mode.main.binding]

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# alt-1 = 'workspace 1'
# alt-2 = 'workspace 2'
# alt-3 = 'workspace 3'
# alt-4 = 'workspace 4'
# alt-5 = 'workspace 5'
# alt-6 = 'workspace 6'
# alt-7 = 'workspace 7'
# alt-8 = 'workspace 8'
# alt-9 = 'workspace 9'
# alt-0 = 'workspace 10'
alt-a = 'workspace A' # In your config, you can drop workspace bindings that you don't need
alt-b = 'workspace B'
alt-c = 'workspace C'
alt-d = 'workspace D'
alt-e = 'workspace E'
alt-f = 'workspace F'
alt-g = 'workspace G'
alt-i = 'workspace I'
alt-m = 'workspace M'
alt-n = 'workspace N'
alt-o = 'workspace O'
alt-p = 'workspace P'
alt-q = 'workspace Q'
alt-r = 'workspace R'
alt-s = 'workspace S'
alt-t = 'workspace T'
alt-u = 'workspace U'
alt-v = 'workspace V'
alt-w = 'workspace W'
alt-x = 'workspace X'
alt-y = 'workspace Y'
alt-z = 'workspace Z'

# alt-shift-1 = 'move-node-to-workspace 1'
# alt-shift-2 = 'move-node-to-workspace 2'
# alt-shift-3 = 'move-node-to-workspace 3'
# alt-shift-4 = 'move-node-to-workspace 4'
# alt-shift-5 = 'move-node-to-workspace 5'
# alt-shift-6 = 'move-node-to-workspace 6'
# alt-shift-7 = 'move-node-to-workspace 7'
# alt-shift-8 = 'move-node-to-workspace 8'
# alt-shift-9 = 'move-node-to-workspace 9'
# alt-shift-0 = 'move-node-to-workspace 10'
alt-shift-a = 'move-node-to-workspace A'
alt-shift-b = 'move-node-to-workspace B'
alt-shift-c = 'move-node-to-workspace C'
alt-shift-d = 'move-node-to-workspace D'
alt-shift-e = 'move-node-to-workspace E'
alt-shift-f = 'move-node-to-workspace F'
alt-shift-g = 'move-node-to-workspace G'
alt-shift-i = 'move-node-to-workspace I'
alt-shift-m = 'move-node-to-workspace M'
alt-shift-n = 'move-node-to-workspace N'
alt-shift-o = 'move-node-to-workspace O'
alt-shift-p = 'move-node-to-workspace P'
alt-shift-q = 'move-node-to-workspace Q'
alt-shift-r = 'move-node-to-workspace R'
alt-shift-s = 'move-node-to-workspace S'
alt-shift-t = 'move-node-to-workspace T'
alt-shift-u = 'move-node-to-workspace U'
alt-shift-v = 'move-node-to-workspace V'
alt-shift-w = 'move-node-to-workspace W'
alt-shift-x = 'move-node-to-workspace X'
alt-shift-y = 'move-node-to-workspace Y'
alt-shift-z = 'move-node-to-workspace Z'

# # split keyboard
# alt-n = 'workspace 1'
# alt-e = 'workspace 2'
# alt-i = 'workspace 3'
# alt-comma = 'workspace 4'
# alt-period = 'workspace 5'
# alt-m = 'workspace 10'
#
# alt-shift-n = 'move-node-to-workspace 1'
# alt-shift-e = 'move-node-to-workspace 2'
# alt-shift-i = 'move-node-to-workspace 3'
# alt-shift-comma = 'move-node-to-workspace 4'
# alt-shift-period = 'move-node-to-workspace 5'
# alt-shift-m = 'move-node-to-workspace 10'

# alt-t = 'layout tiles horizontal vertical'
# alt-b = 'layout accordion horizontal'
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

alt-esc = 'flatten-workspace-tree'

alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

alt-space = 'mode service'
[mode.service.binding]
h = 'resize width -50'
j = 'resize height -50'
k = 'resize height +50'
l = 'resize width +50'
f = ['layout floating tiling', 'mode main']


alt-h = ['join-with left', 'mode main']
alt-j = ['join-with down', 'mode main']
alt-k = ['join-with up', 'mode main']
alt-l = ['join-with right', 'mode main']

backspace = ['close-all-windows-but-current', 'mode main']

esc = ['reload-config', 'mode main']

[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.right = [{ monitor."built" = 2 }, { monitor."lg" = 5 }, 0]
outer.left = [{ monitor."built" = 2 }, { monitor."lg" = 5 }, 0]
outer.top = [
  { monitor."built" = 5 },
  { monitor."lg" = 10 },
  { monitor."HP E24 G4" = 0 },
  0,
]
outer.bottom = [{ monitor."built" = 2 }, { monitor."lg" = 5 }, 0]

# app to window mapping
[[on-window-detected]]
if.app-name-regex-substring = 'Cypress|Shottr|Neovide|Numbers|Finder|Raycast|Koodo|E-book'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Ghostty'
run = 'move-node-to-workspace A'

[[on-window-detected]]
if.app-name-regex-substring = 'Brave|Chrome'
run = 'move-node-to-workspace S'

[[on-window-detected]]
if.app-name-regex-substring = "Gmail|Discord"
run = ['move-node-to-workspace D']
