start-at-login = true

after-startup-command = [
  'exec-and-forget borders active_color=0xff869a6e inactive_color=0xff494d64 width=5.0',
]

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 10

default-root-container-layout = 'tiles'

default-root-container-orientation = 'auto'

key-mapping.preset = 'qwerty'

on-focus-changed = ['move-mouse window-lazy-center']
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[exec]
inherit-env-vars = true

[exec.env-vars]
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

[workspace-to-monitor-force-assignment]
0 = ['secondary']

[mode.main.binding]

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-q = 'workspace 1'
alt-w = 'workspace 2'
alt-e = 'workspace 3'
alt-a = 'workspace 4'
alt-s = 'workspace 5'
alt-d = 'workspace 6'
alt-z = 'workspace 7'
alt-x = 'workspace 8'
alt-c = 'workspace 9'
alt-f = 'workspace 0'

alt-shift-q = 'move-node-to-workspace 1'
alt-shift-w = 'move-node-to-workspace 2'
alt-shift-e = 'move-node-to-workspace 3'
alt-shift-a = 'move-node-to-workspace 4'
alt-shift-s = 'move-node-to-workspace 5'
alt-shift-d = 'move-node-to-workspace 6'
alt-shift-z = 'move-node-to-workspace 7'
alt-shift-x = 'move-node-to-workspace 8'
alt-shift-c = 'move-node-to-workspace 9'
alt-shift-f = 'move-node-to-workspace 0'

alt-t = 'layout tiles horizontal vertical'
alt-b = 'layout accordion horizontal'

alt-esc = 'flatten-workspace-tree'

alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

alt-space = 'mode service'
[mode.service.binding]
h = 'resize width -50'
j = 'resize height -50'
k = 'resize height +50'
l = 'resize width +50'
f = ['layout floating tiling', 'mode main']


alt-h = ['join-with left', 'mode main']
alt-j = ['join-with down', 'mode main']
alt-k = ['join-with up', 'mode main']
alt-l = ['join-with right', 'mode main']

backspace = ['close-all-windows-but-current', 'mode main']

esc = ['reload-config', 'mode main']

[gaps]
inner.horizontal = 1
inner.vertical = 1
outer.right = [{ monitor."built" = 2 }, { monitor."lg" = 30 }, 0]
outer.left = [{ monitor."built" = 2 }, { monitor."lg" = 30 }, 0]
outer.top = [
  { monitor."built" = 5 },
  { monitor."lg" = 30 },
  { monitor."HP E24 G4" = 0 },
  0,
]
outer.bottom = [{ monitor."built" = 2 }, { monitor."lg" = 30 }, 0]

# app to window mapping
[[on-window-detected]]
if.app-name-regex-substring = 'Cypress|Shottr|Neovide|Numbers|Finder|Raycast|Koodo|E-book'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Ghostty'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-name-regex-substring = 'Brave'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-name-regex-substring = "Gmail|Discord"
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-name-regex-substring = 'Citrix'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-name-regex-substring = 'Chrome'
run = 'move-node-to-workspace 5'

[[on-window-detected]]
if.app-name-regex-substring = 'Gemini'
run = 'move-node-to-workspace 7'
