bind q source-file ~/.tmux.conf \; display-message "tmux reloaded..."

bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E 'lazygit'

# init tmux plugin manager, always in the end
run '~/.tmux/plugins/tpm/tpm'
