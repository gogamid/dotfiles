# Prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

set -g extended-keys on
set -g extended-keys-format csi-u

# Vi mode for copy
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Controls
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind x kill-pane

set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @smart-splits_move_left_key  'C-h' 
set -g @smart-splits_move_down_key  'C-j'
set -g @smart-splits_move_up_key    'C-k'
set -g @smart-splits_move_right_key 'C-l'

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

bind-key -n M-Tab if-shell '[ "#{window_index}" = "1" ]' 'select-window -t 2' 'select-window -t 1'

bind q source-file ~/.tmux.conf \; display-message "tmux reloaded..."

bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E 'lazygit'

bind e run "tmux capture-pane -S - -p -J > /tmp/tmux-scrollback && tmux new-window 'nvim /tmp/tmux-scrollback'"

# init tmux plugin manager, always in the end
run '~/.tmux/plugins/tpm/tpm'
